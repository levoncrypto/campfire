name: Build Windows (PR1295 + PR1296)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout upstream staging
        uses: actions/checkout@v4
        with:
          repository: cypherstack/stack_wallet
          ref: staging
          fetch-depth: 0
          submodules: recursive

      - name: Merge PR 1295 and PR 1296
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin pull/1295/head:pr-1295
          git fetch origin pull/1296/head:pr-1296
          git checkout -b build/pr1295-pr1296
          git merge --no-ff --no-edit pr-1295
          git merge --no-ff --no-edit pr-1296

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"

      - name: Init submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Generate Stack Wallet config + required generated files
        shell: bash
        run: |
          source scripts/env.sh
          export BUILD_ISAR_FROM_SOURCE=0

          # Creates lib/external_api_keys.dart if missing
          (cd scripts && bash prebuild.sh)

          # Creates pubspec.yaml from template + platform templates
          source scripts/app_config/templates/configure_template_files.sh

          # Fill version placeholders in pubspec.yaml
          bash scripts/app_config/shared/update_version.sh -v 2.1.0 -b 12951296

          # Generates app_config.g.dart + enables deps + generates wl_gen interfaces
          # (without windows arg to avoid mwebd.exe build in CI)
          bash scripts/app_config/configure_stack_wallet.sh

          # Disable flutter_mwebd dependency to avoid Windows CI blocker in this pipeline
          sed -i 's/^[[:space:]]*flutter_mwebd:/#  flutter_mwebd:/' pubspec.yaml

          # Re-generate interfaces with MWEBD disabled (OFF sections used)
          dart tool/gen_interfaces.dart \
            tool/wl_templates \
            lib/wl_gen/generated \
            MWC XMR WOW SAL TOR EPIC FIRO XEL FROST

          echo "----- sanity checks -----"
          test -f pubspec.yaml
          test -f lib/app_config.g.dart
          test -f lib/external_api_keys.dart
          test -f lib/wl_gen/generated/tor_service_impl.dart
          test -f lib/wl_gen/generated/lib_spark_interface_impl.dart
          test -f lib/wl_gen/generated/mwebd_server_interface_impl.dart
          head -n 30 pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Windows project exists
        shell: bash
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows .

      - name: Build secp256k1.dll (Windows)
        shell: pwsh
        run: |
          cmd /c "cd scripts\windows && build_secp256k1.bat"

          $dll = Get-ChildItem -Path "scripts/windows/build/secp256k1" -Recurse -Filter "libsecp256k1-2.dll" | Select-Object -First 1
          if (-not $dll) {
            throw "libsecp256k1-2.dll not found after build"
          }

          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          Copy-Item $dll.FullName "build/secp256k1.dll" -Force

          if (-not (Test-Path "build/secp256k1.dll")) {
            throw "secp256k1.dll copy failed"
          }

          Write-Host "secp256k1.dll prepared at build/secp256k1.dll"

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip release
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows_build.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: windows_build.zip
