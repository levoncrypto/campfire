name: Build Windows (PR1295 + PR1296)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout selected commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"

      - name: Detect project root
        id: root
        shell: pwsh
        run: |
          if (Test-Path "pubspec.yaml") {
            "dir=." | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } elseif (Test-Path "stack_wallet/pubspec.yaml") {
            "dir=stack_wallet" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Error "pubspec.yaml not found in repo root or stack_wallet/"
            Get-ChildItem -Force
            exit 1
          }

      - name: Flutter pub get
        shell: pwsh
        run: flutter pub get
        working-directory: ${{ steps.root.outputs.dir }}

      - name: Build Windows release
        shell: pwsh
        run: flutter build windows --release
        working-directory: ${{ steps.root.outputs.dir }}

      - name: Zip release
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "${{ steps.root.outputs.dir }}/build/windows/x64/runner/Release/*" `
            -DestinationPath "windows_build.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: windows_build.zip
