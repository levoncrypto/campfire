name: Build Windows (PR1295 + PR1296)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout upstream staging
        uses: actions/checkout@v4
        with:
          repository: cypherstack/stack_wallet
          ref: staging
          fetch-depth: 0

      - name: Merge PR 1295 and PR 1296
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin pull/1295/head:pr-1295
          git fetch origin pull/1296/head:pr-1296
          git checkout -b build/pr1295-pr1296
          git merge --no-ff --no-edit pr-1295
          git merge --no-ff --no-edit pr-1296

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip release
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows_build.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: windows_build.zip
