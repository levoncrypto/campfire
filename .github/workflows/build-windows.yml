name: Build Windows (PR1295 + PR1296)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout upstream staging
        uses: actions/checkout@v4
        with:
          repository: cypherstack/stack_wallet
          ref: staging
          fetch-depth: 0
          submodules: recursive

      - name: Merge PR 1295 and PR 1296
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin pull/1295/head:pr-1295
          git fetch origin pull/1296/head:pr-1296
          git checkout -b build/pr1295-pr1296
          git merge --no-ff --no-edit pr-1295
          git merge --no-ff --no-edit pr-1296

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"

      - name: Init submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Generate pubspec.yaml for Stack Wallet
        shell: bash
        run: |
          cp scripts/app_config/templates/pubspec.template.yaml pubspec.yaml
          sed -i 's/^name: PLACEHOLDER/name: stackwallet/' pubspec.yaml
          sed -i 's/^description: PLACEHOLDER/description: Stack Wallet/' pubspec.yaml
          sed -i 's/PLACEHOLDER_V/2.1.0/g' pubspec.yaml
          sed -i 's/PLACEHOLDER_B/12951296/g' pubspec.yaml

          dart tool/process_pubspec_deps.dart \
            pubspec.yaml \
            MWC MWEBD XMR WOW SAL TOR EPIC FIRO XEL FROST

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Windows project exists
        shell: bash
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows .

      - name: Build secp256k1.dll (Windows)
        shell: cmd
        run: |
          cd scripts\windows
          if exist build\secp256k1 rmdir /s /q build\secp256k1
          call build_secp256k1.bat
          cd ..\..
          if not exist build\secp256k1.dll (
            echo secp256k1.dll was not produced
            exit /b 1
          )

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip release
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows_build.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: windows_build.zip
