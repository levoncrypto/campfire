name: Build Windows (PR1295 + PR1296)
run-name: Build Windows PR1295+1296 by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout upstream staging
        uses: actions/checkout@v4
        with:
          repository: cypherstack/stack_wallet
          ref: staging
          fetch-depth: 0
          submodules: recursive

      - name: Merge PR 1295 and PR 1296
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin pull/1295/head:pr-1295
          git fetch origin pull/1296/head:pr-1296

          git checkout -b build/pr1295-pr1296
          git merge --no-ff --no-edit pr-1295
          git merge --no-ff --no-edit pr-1296

          git log --oneline -n 5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Init submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Generate Stack Wallet config + required generated files
        shell: bash
        run: |
          source scripts/env.sh
          export BUILD_ISAR_FROM_SOURCE=0

          (cd scripts && bash prebuild.sh)
          source scripts/app_config/templates/configure_template_files.sh
          bash scripts/app_config/shared/update_version.sh -v 2.1.0 -b 12951296
          bash scripts/app_config/configure_stack_wallet.sh

          # Re-generate interfaces explicitly without MWEBD
          dart tool/gen_interfaces.dart \
            tool/wl_templates \
            lib/wl_gen/generated \
            MWC XMR WOW SAL TOR EPIC FIRO XEL FROST

          # Hard-disable problematic optional deps for CI Windows build
          python - <<'PY'
from pathlib import Path
p = Path("pubspec.yaml")
t = p.read_text(encoding="utf-8")
t = t.replace("  flutter_mwebd:", "  # flutter_mwebd:")
t = t.replace("  sqlite3_flutter_libs:", "  # sqlite3_flutter_libs:")
p.write_text(t, encoding="utf-8")
print("Patched pubspec.yaml: flutter_mwebd + sqlite3_flutter_libs disabled")
PY

          # Verify they are not enabled as active keys
          if grep -Eq '^[[:space:]]*flutter_mwebd:' pubspec.yaml; then
            echo "flutter_mwebd is still enabled"; exit 1
          fi
          if grep -Eq '^[[:space:]]*sqlite3_flutter_libs:' pubspec.yaml; then
            echo "sqlite3_flutter_libs is still enabled"; exit 1
          fi

      - name: Create plugin git_versions.dart files
        shell: bash
        run: |
          COMMIT="$(git log -1 --pretty=format:%H)"

          if [ -f crypto_plugins/flutter_libepiccash/lib/git_versions_example.dart ]; then
            cp crypto_plugins/flutter_libepiccash/lib/git_versions_example.dart crypto_plugins/flutter_libepiccash/lib/git_versions.dart
            sed -i "s|/\*WINDOWS_VERSION\*/ const WINDOWS_VERSION = \"\"|/\*WINDOWS_VERSION\*/ const WINDOWS_VERSION = \"${COMMIT}\"|" crypto_plugins/flutter_libepiccash/lib/git_versions.dart
          fi

          if [ -f crypto_plugins/flutter_libmwc/lib/git_versions_example.dart ]; then
            cp crypto_plugins/flutter_libmwc/lib/git_versions_example.dart crypto_plugins/flutter_libmwc/lib/git_versions.dart
            sed -i "s|/\*WINDOWS_VERSION\*/ const WINDOWS_VERSION = \"\"|/\*WINDOWS_VERSION\*/ const WINDOWS_VERSION = \"${COMMIT}\"|" crypto_plugins/flutter_libmwc/lib/git_versions.dart
          fi

      - name: Prepare assets for Stack Wallet
        shell: pwsh
        run: |
          $dirs = @("default_themes","icon","lottie","in_app_logo_icons","svg")
          foreach ($d in $dirs) {
            $src = "asset_sources/$d/stack_wallet"
            $dst = "assets/$d"

            if (!(Test-Path $src)) { throw "Missing source assets directory: $src" }
            if (Test-Path $dst) { Remove-Item $dst -Recurse -Force }
            Copy-Item $src $dst -Recurse -Force
          }

          if (!(Test-Path "assets/lottie/loader.json")) {
            throw "Missing assets/lottie/loader.json after copy"
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure Windows project exists
        shell: bash
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows .

      - name: Normalize Windows CMake placeholders
        shell: pwsh
        run: |
          $cm = "windows/CMakeLists.txt"
          $txt = Get-Content $cm -Raw

          $txt = $txt -replace 'project\(place_holder LANGUAGES CXX\)', 'project(stack_wallet LANGUAGES CXX)'
          $txt = $txt -replace 'set\(BINARY_NAME "place_holder"\)', 'set(BINARY_NAME "stack_wallet")'
          $txt = $txt -replace 'set\(INCLUDE_EPIC_SO INCLUDE_EPIC_SO_FLAG\)', 'set(INCLUDE_EPIC_SO OFF)'
          $txt = $txt -replace 'set\(INCLUDE_MWC_SO INCLUDE_MWC_SO_FLAG\)', 'set(INCLUDE_MWC_SO OFF)'

          Set-Content $cm $txt

          Write-Host "Normalized CMake placeholders."

      - name: Build secp256k1.dll (Windows)
        shell: pwsh
        run: |
          cmd /c "cd scripts\windows && build_secp256k1.bat"

          $dll = Get-ChildItem -Path "scripts/windows/build/secp256k1" -Recurse -Filter "libsecp256k1-2.dll" | Select-Object -First 1
          if (-not $dll) { throw "libsecp256k1-2.dll not found after build" }

          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          Copy-Item $dll.FullName "build/secp256k1.dll" -Force

          if (-not (Test-Path "build/secp256k1.dll")) { throw "secp256k1.dll copy failed" }

      - name: Build Windows release (verbose)
        run: flutter build windows --release -v

      - name: Zip release
        shell: pwsh
        run: |
          $releasePath = "build/windows/x64/runner/Release"
          if (!(Test-Path $releasePath)) { throw "Release folder not found: $releasePath" }
          Compress-Archive -Path "$releasePath/*" -DestinationPath windows_build.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_build_pr1295_pr1296
          path: windows_build.zip
