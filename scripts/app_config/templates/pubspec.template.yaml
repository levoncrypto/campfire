    - assets/images/
    - assets/icon/
    - google_fonts/
    - assets/svg/

    # coin control icons
    - assets/svg/coin_control/

    # socials
    - assets/svg/socials/

    # exchange icons
    - assets/svg/exchange_icons/

    # buy
    - assets/svg/buy/

    # gif
    - assets/gif/

    # lottie animations
